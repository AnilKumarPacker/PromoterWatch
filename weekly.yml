# .github/workflows/weekly.yml
# Runs every Monday at 08:00 IST (02:30 UTC)
# Saves the HTML report directly to your Google Drive folder

name: Weekly Promoter Report

on:
  schedule:
    - cron: '30 2 * * 1'   # Monday 08:00 IST
  workflow_dispatch:         # allows manual run from GitHub UI anytime

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            requests \
            beautifulsoup4 \
            anthropic \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib

      - name: Run promoter watch
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python promoter_watch.py
