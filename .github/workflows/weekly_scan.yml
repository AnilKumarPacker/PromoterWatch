name: Weekly Insider Scan

on:
  schedule:
    - cron: '0 9 * * 1' 
  workflow_dispatch:   

jobs:
  build:
    runs-on: ubuntu-latest
    # Optional: Forces all actions in this job to use Node 24 immediately
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        # Updated from v4 to v6
        uses: actions/checkout@v6

      - name: Set up Python
        # Updated from v5 to v6
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Scanner
        run: python insider_scanner.py

      - name: Upload to Google Drive
        # Using the main branch usually pulls the latest compatibility updates
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          filename: insider_report.csv
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "false"
